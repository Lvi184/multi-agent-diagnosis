<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoodAngels-LangGraph 引导式多轮对话</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; background: #f4f7fb; }
    body { margin: 0; }
    .layout { max-width: 1100px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }
    .card { background: white; border-radius: 18px; box-shadow: 0 12px 32px rgba(15,23,42,.08); overflow: hidden; }
    .header { padding: 18px 22px; border-bottom: 1px solid #e5e7eb; }
    .header h1 { font-size: 20px; margin: 0; }
    .sub { margin-top: 6px; color: #6b7280; font-size: 13px; }
    .mode-badge { display: inline-block; padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; margin-left: 10px; }
    .mode-guided { background: #dbeafe; color: #1d4ed8; }
    .mode-quick { background: #dcfce7; color: #166534; }
    .chat { height: 520px; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 82%; padding: 12px 14px; border-radius: 16px; line-height: 1.55; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #eef2ff; border-bottom-left-radius: 4px; }
    .input { border-top: 1px solid #e5e7eb; padding: 14px; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    textarea { resize: vertical; min-height: 58px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px; font-size: 14px; }
    button { border: 0; background: #111827; color: white; padding: 0 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .side { padding: 18px; display: grid; gap: 12px; }
    label { font-size: 13px; color: #374151; display: grid; gap: 6px; }
    input, select { border: 1px solid #cbd5e1; border-radius: 10px; padding: 9px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #d1d5db; border-radius: 14px; padding: 14px; max-height: 380px; overflow: auto; font-size: 12px; }
    .warn { color: #991b1b; background: #fee2e2; padding: 10px; border-radius: 12px; font-size: 13px; }
    .info { color: #1e40af; background: #dbeafe; padding: 10px; border-radius: 12px; font-size: 13px; }
    .collected { background: #f8fafc; border-radius: 12px; padding: 12px; font-size: 13px; }
    .collected h4 { margin: 0 0 8px 0; color: #475569; }
    .collected-item { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #e2e8f0; }
    .collected-item:last-child { border-bottom: none; }
    .status { text-align: center; padding: 8px; border-radius: 10px; font-size: 13px; font-weight: 600; }
    .status-collecting { background: #fef3c7; color: #92400e; }
    .status-diagnosing { background: #dbeafe; color: #1e40af; }
    .status-completed { background: #dcfce7; color: #166534; }
    .btn-secondary { background: #f1f5f9; color: #334155; }
    .btn-group { display: flex; gap: 8px; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; padding: 12px; } .chat { height: 440px; } }
  </style>
</head>
<body>
  <div class="layout">
    <section class="card">
      <div class="header">
        <div style="display: flex; align-items: center; justify-content: space-between;">
          <div style="display: flex; align-items: center;">
            <h1>MoodAngels-LangGraph</h1>
            <span id="modeBadge" class="mode-badge mode-guided">引导式评估</span>
          </div>
          <button class="btn-secondary" onclick="resetSession()" style="font-size: 12px; padding: 6px 12px;">重置会话</button>
        </div>
        <div class="sub" id="flowDesc">
          ① 对话引导 → ② 数据标准化 → ③ 量表评估 → ④ 多Agent诊断 → ⑤ 生成报告
        </div>
      </div>
      <div id="chat" class="chat"></div>
      <div class="input">
        <textarea id="message" placeholder="请描述您的情况..."></textarea>
        <div class="btn-group">
          <button id="send" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </section>

    <aside class="card side">
      <div class="warn">⚠️ 安全声明：本系统仅用于科研/教学原型和辅助筛查演示，不构成医学确诊或治疗建议。高危风险请立即线下求助。</div>
      
      <div id="statusBox" class="status status-collecting">
        📋 信息采集中
      </div>

      <div class="collected">
        <h4>📊 已收集信息</h4>
        <div id="collectedInfo">
          <div class="collected-item"><span>症状</span><span>-</span></div>
          <div class="collected-item"><span>持续时间</span><span>-</span></div>
          <div class="collected-item"><span>既往史</span><span>-</span></div>
          <div class="collected-item"><span>用药史</span><span>-</span></div>
          <div class="collected-item"><span>PHQ-9 抑郁量表</span><span>-</span></div>
          <div class="collected-item"><span>GAD-7 焦虑量表</span><span>-</span></div>
        </div>
      </div>

      <div>
        <label>Session ID<input id="session" value="web-demo" /></label>
        <label>年龄<input id="age" type="number" value="" placeholder="选填" /></label>
        <label>性别
          <select id="gender">
            <option value="">请选择</option>
            <option value="female">女</option>
            <option value="male">男</option>
            <option value="other">其他</option>
          </select>
        </label>
      </div>

      <div class="info">
        💡 <strong>使用提示：</strong><br/>
        系统会主动引导您完成信息采集，无需手动填写量表。回答问题即可，信息收集完成后自动执行完整诊断。
      </div>

      <div>
        <h4 style="margin: 10px 0 8px 0; font-size: 14px;">诊断结果</h4>
        <pre id="out">等待信息收集完成...</pre>
      </div>
    </aside>
  </div>

<script>
const chat = document.getElementById('chat');
let history = [];
let isDiagnosing = false;

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 欢迎语
addMsg('您好！我是心理健康辅助筛查助手。\n\n请简单描述一下您的情况，比如：最近的心情、睡眠情况、有哪些困扰等。', 'bot');

function updateCollectedInfo(info) {
  if (!info) return;
  
  const symptoms = info.symptoms && info.symptoms.length > 0 ? info.symptoms.join('、') : '-';
  const duration = info.duration || '-';
  const medicalHistory = info.medical_history || '-';
  const medicationHistory = info.medication_history || '-';
  
  let phq9Score = '-';
  let gad7Score = '-';
  if (info.scales) {
    if (info.scales.PHQ9) {
      phq9Score = typeof info.scales.PHQ9 === 'object' 
        ? `${info.scales.PHQ9.score || '-'} 分` 
        : `${info.scales.PHQ9} 分`;
    }
    if (info.scales.GAD7) {
      gad7Score = typeof info.scales.GAD7 === 'object' 
        ? `${info.scales.GAD7.score || '-'} 分` 
        : `${info.scales.GAD7} 分`;
    }
  }
  
  document.getElementById('collectedInfo').innerHTML = `
    <div class="collected-item"><span>症状</span><span>${symptoms}</span></div>
    <div class="collected-item"><span>持续时间</span><span>${duration}</span></div>
    <div class="collected-item"><span>既往史</span><span>${medicalHistory}</span></div>
    <div class="collected-item"><span>用药史</span><span>${medicationHistory}</span></div>
    <div class="collected-item"><span>PHQ-9 抑郁量表</span><span>${phq9Score}</span></div>
    <div class="collected-item"><span>GAD-7 焦虑量表</span><span>${gad7Score}</span></div>
  `;
}

function updateStatus(status) {
  const statusBox = document.getElementById('statusBox');
  const modeBadge = document.getElementById('modeBadge');
  
  switch(status) {
    case 'collecting':
      statusBox.className = 'status status-collecting';
      statusBox.textContent = '📋 信息采集中';
      modeBadge.className = 'mode-badge mode-guided';
      modeBadge.textContent = '引导式评估';
      break;
    case 'diagnosing':
      statusBox.className = 'status status-diagnosing';
      statusBox.textContent = '🔍 诊断分析中...';
      break;
    case 'completed':
      statusBox.className = 'status status-completed';
      statusBox.textContent = '✅ 评估完成';
      break;
  }
}

async function sendMessage() {
  const btn = document.getElementById('send');
  const msg = document.getElementById('message').value.trim();
  if (!msg || isDiagnosing) return;
  
  addMsg(msg, 'user');
  history.push(msg);
  btn.disabled = true;
  document.getElementById('message').value = '';
  
  const loadingMsg = document.createElement('div');
  loadingMsg.className = 'msg bot';
  loadingMsg.textContent = '...';
  chat.appendChild(loadingMsg);
  
  const body = {
    session_id: document.getElementById('session').value || 'web-demo',
    message: msg,
    age: Number(document.getElementById('age').value || 0) || null,
    gender: document.getElementById('gender').value || null,
  };
  
  try {
    const res = await fetch('/api/dialogue', { 
      method: 'POST', 
      headers: {'Content-Type':'application/json'}, 
      body: JSON.stringify(body) 
    });
    const data = await res.json();
    
    // 更新状态
    if (data.status === 'completed' || data.is_completed) {
      isDiagnosing = true;
      updateStatus('completed');
      updateStatus('diagnosing');
    } else {
      updateStatus('collecting');
    }
    
    // 更新已收集信息
    updateCollectedInfo(data.collected_info);
    
    // 更新诊断结果
    if (data.diagnosis_result) {
      document.getElementById('out').textContent = JSON.stringify(data.diagnosis_result, null, 2);
      updateStatus('completed');
    }
    
    // 更新界面模式
    if (data.mode === 'quick') {
      document.getElementById('modeBadge').className = 'mode-badge mode-quick';
      document.getElementById('modeBadge').textContent = '快速诊断模式';
    }
    
    // 显示回复
    chat.removeChild(loadingMsg);
    addMsg(data.reply, 'bot');
    history.push(data.reply || '');
    
  } catch (e) {
    chat.removeChild(loadingMsg);
    addMsg('请求失败：' + e.message, 'bot');
  } finally {
    btn.disabled = false;
  }
}

async function resetSession() {
  const sessionId = document.getElementById('session').value || 'web-demo';
  
  try {
    await fetch(`/api/session/${sessionId}`, { method: 'DELETE' });
  } catch (e) {
    console.error('Reset failed:', e);
  }
  
  history = [];
  isDiagnosing = false;
  document.getElementById('message').value = '';
  document.getElementById('message').disabled = false;
  document.getElementById('out').textContent = '等待信息收集完成...';
  
  // 清空聊天
  chat.innerHTML = '';
  
  // 重置已收集信息显示
  document.getElementById('collectedInfo').innerHTML = `
    <div class="collected-item"><span>症状</span><span>-</span></div>
    <div class="collected-item"><span>持续时间</span><span>-</span></div>
    <div class="collected-item"><span>既往史</span><span>-</span></div>
    <div class="collected-item"><span>用药史</span><span>-</span></div>
    <div class="collected-item"><span>PHQ-9 抑郁量表</span><span>-</span></div>
    <div class="collected-item"><span>GAD-7 焦虑量表</span><span>-</span></div>
  `;
  
  updateStatus('collecting');
  
  // 重新显示欢迎语
  addMsg('您好！我是心理健康辅助筛查助手。\n\n请简单描述一下您的情况，比如：最近的心情、睡眠情况、有哪些困扰等。', 'bot');
}

// 回车发送
document.getElementById('message').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
