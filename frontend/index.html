<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MoodAngels LangGraph Chat</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; background: #f4f7fb; }
    body { margin: 0; }
    .layout { max-width: 1080px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: 1.4fr .9fr; gap: 18px; }
    .card { background: white; border-radius: 18px; box-shadow: 0 12px 32px rgba(15,23,42,.08); overflow: hidden; }
    .header { padding: 18px 22px; border-bottom: 1px solid #e5e7eb; }
    h1 { font-size: 22px; margin: 0; }
    .sub { margin-top: 6px; color: #6b7280; font-size: 13px; }
    .chat { height: 560px; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 12px; }
    .msg { max-width: 82%; padding: 12px 14px; border-radius: 16px; line-height: 1.55; white-space: pre-wrap; }
    .user { align-self: flex-end; background: #2563eb; color: white; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #eef2ff; border-bottom-left-radius: 4px; }
    .input { border-top: 1px solid #e5e7eb; padding: 14px; display: grid; grid-template-columns: 1fr auto; gap: 10px; }
    textarea { resize: vertical; min-height: 58px; border: 1px solid #cbd5e1; border-radius: 12px; padding: 10px; font-size: 14px; }
    button { border: 0; background: #111827; color: white; padding: 0 18px; border-radius: 12px; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .side { padding: 18px; display: grid; gap: 12px; }
    label { font-size: 13px; color: #374151; display: grid; gap: 6px; }
    input, select { border: 1px solid #cbd5e1; border-radius: 10px; padding: 9px; }
    pre { white-space: pre-wrap; word-break: break-word; background: #0f172a; color: #d1d5db; border-radius: 14px; padding: 14px; max-height: 420px; overflow: auto; font-size: 12px; }
    .warn { color: #991b1b; background: #fee2e2; padding: 10px; border-radius: 12px; font-size: 13px; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; padding: 12px; } .chat { height: 440px; } }
  </style>
</head>
<body>
  <div class="layout">
    <section class="card">
      <div class="header">
        <h1>MoodAngels-LangGraph 多Agent对话窗口</h1>
        <div class="sub">Intake → Structuring → Scale → MoodAngels → Model Verification → Knowledge → Differential → Risk → Validator → Report</div>
      </div>
      <div id="chat" class="chat"></div>
      <div class="input">
        <textarea id="message" placeholder="请输入患者主诉或对话内容...">最近2个月情绪低落，睡不着，对事情没兴趣，有时觉得不想活。</textarea>
        <button id="send" onclick="sendMessage()">发送</button>
      </div>
    </section>

    <aside class="card side">
      <div class="warn">安全声明：本系统仅用于科研/教学原型和辅助筛查演示，不构成医学确诊或治疗建议。高危风险请立即线下求助。</div>
      <label>Session ID<input id="session" value="web-demo" /></label>
      <label>年龄<input id="age" type="number" value="22" /></label>
      <label>性别<select id="gender"><option value="female">female</option><option value="male">male</option><option value="other">other</option></select></label>
      <label>PHQ-9 总分<input id="phq9" type="number" value="18" /></label>
      <label>GAD-7 总分<input id="gad7" type="number" value="11" /></label>
      <label>HAMD 总分<input id="hamd" type="number" value="0" /></label>
      <label>HAMA 总分<input id="hama" type="number" value="0" /></label>
      <div>
        <strong>最近一次结构化结果</strong>
        <pre id="out">等待提交...</pre>
      </div>
    </aside>
  </div>
<script>
const chat = document.getElementById('chat');
let history = [];
function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
addMsg('你好，我是多Agent精神健康辅助筛查原型。请描述你的主诉、持续时间、睡眠/食欲变化、既往史和是否有高危想法。', 'bot');
async function sendMessage() {
  const btn = document.getElementById('send');
  const msg = document.getElementById('message').value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  history.push(msg);
  btn.disabled = true;
  addMsg('正在调用 LangGraph 多Agent流程...', 'bot');
  const body = {
    session_id: document.getElementById('session').value || 'web-demo',
    message: msg,
    age: Number(document.getElementById('age').value || 0) || null,
    gender: document.getElementById('gender').value,
    scale_answers: {
      PHQ9: Number(document.getElementById('phq9').value || 0),
      GAD7: Number(document.getElementById('gad7').value || 0),
      HAMD: Number(document.getElementById('hamd').value || 0),
      HAMA: Number(document.getElementById('hama').value || 0),
    },
    history
  };
  try {
    const res = await fetch('/api/chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const data = await res.json();
    document.querySelectorAll('.bot')[document.querySelectorAll('.bot').length-1].textContent = data.reply || '已完成。';
    document.getElementById('out').textContent = JSON.stringify(data.report, null, 2);
    history.push(data.reply || '');
  } catch (e) {
    addMsg('请求失败：' + e.message, 'bot');
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
