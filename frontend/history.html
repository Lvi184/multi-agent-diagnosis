<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的诊断记录 - AI 心理健康筛查系统</title>
  <style>
    :root { font-family: system-ui, -apple-system, sans-serif; color: #1f2937; background: #f4f7fb; }
    body { margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
    
    /* 头部 */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; margin: 0; }
    .back-btn { background: #f1f5f9; color: #374151; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 14px; font-weight: 600; }
    .back-btn:hover { background: #e2e8f0; }
    
    /* 未登录提示 */
    .login-prompt { background: white; padding: 48px; text-align: center; border-radius: 18px; box-shadow: 0 12px 32px rgba(15,23,42,.08); }
    .login-prompt h2 { margin-top: 0; }
    .btn-primary { background: #2563eb; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .btn-primary:hover { background: #1d4ed8; }
    
    /* 记录列表 */
    .records-grid { display: grid; gap: 16px; }
    .record-card { background: white; border-radius: 18px; box-shadow: 0 4px 12px rgba(0,0,0,.05); padding: 20px; cursor: pointer; transition: all 0.2s; }
    .record-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .record-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
    .record-date { font-size: 13px; color: #6b7280; }
    .risk-badge { padding: 4px 10px; border-radius: 10px; font-size: 12px; font-weight: 600; }
    .risk-high { background: #fee2e2; color: #dc2626; }
    .risk-medium { background: #fef3c7; color: #d97706; }
    .risk-low { background: #dcfce7; color: #16a34a; }
    
    .record-diagnosis { font-size: 14px; color: #374151; margin-bottom: 8px; line-height: 1.5; }
    .record-symptoms { font-size: 13px; color: #6b7280; }
    .empty-state { text-align: center; padding: 60px 20px; color: #9ca3af; }
    .empty-state h3 { margin-bottom: 8px; color: #6b7280; }
    
    /* 详情弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
    .modal.show { display: flex; }
    .modal-content { background: white; border-radius: 18px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; }
    .modal-header h2 { margin: 0; font-size: 18px; }
    .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #6b7280; }
    .modal-body { padding: 24px; }
    
    .detail-section { margin-bottom: 24px; }
    .detail-section h3 { font-size: 16px; margin: 0 0 12px 0; color: #374151; }
    .detail-content { background: #f8fafc; border-radius: 12px; padding: 16px; }
    
    .risk-display { display: inline-block; padding: 6px 14px; border-radius: 10px; font-weight: 600; font-size: 14px; }
    .diagnosis-list { list-style: none; padding: 0; margin: 0; }
    .diagnosis-list li { padding: 6px 0; padding-left: 20px; position: relative; }
    .diagnosis-list li:before { content: "•"; position: absolute; left: 0; color: #2563eb; font-weight: bold; }
    
    .recommendations { background: #eff6ff; border-radius: 10px; padding: 14px 18px; }
    .recommendations h4 { margin: 0 0 10px 0; font-size: 14px; color: #1d4ed8; }
    .recommendations ul { margin: 0; padding-left: 20px; }
    .recommendations li { padding: 4px 0; font-size: 14px; }
    
    pre { background: #0f172a; color: #d1d5db; border-radius: 12px; padding: 16px; font-size: 12px; overflow-x: auto; }
  </style>
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <div class="header">
      <div>
        <h1>📋 我的诊断记录</h1>
        <p style="margin: 6px 0 0 0; color: #6b7280; font-size: 14px;">查看历史诊断结果和建议</p>
      </div>
      <a href="/" class="back-btn">← 返回首页</a>
    </div>
    
    <!-- 未登录提示 -->
    <div id="loginPrompt" class="login-prompt" style="display: none;">
      <h2>🔐 请先登录</h2>
      <p style="color: #6b7280; margin-bottom: 20px;">登录后即可查看您的历史诊断记录</p>
      <button class="btn-primary" onclick="window.location.href='/'">前往登录</button>
    </div>
    
    <!-- 记录列表 -->
    <div id="recordsList" class="records-grid"></div>
    
    <!-- 空状态 -->
    <div id="emptyState" class="empty-state" style="display: none;">
      <h3>📭 暂无诊断记录</h3>
      <p>开始您的第一次心理健康评估吧</p>
      <button class="btn-primary" onclick="window.location.href='/'">开始评估</button>
    </div>
  </div>
  
  <!-- 详情弹窗 -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📋 诊断详情</h2>
        <button class="close-btn" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

<script>
const API_BASE = '/api/v1';
const accessToken = localStorage.getItem('access_token');

// 初始化
document.addEventListener('DOMContentLoaded', function() {
  if (!accessToken) {
    document.getElementById('loginPrompt').style.display = 'block';
    return;
  }
  
  loadRecords();
});

// 加载记录列表
async function loadRecords() {
  try {
    const res = await fetch(`${API_BASE}/diagnosis/records`, {
      headers: {
        'Authorization': `Bearer ${accessToken}`
      }
    });
    
    if (res.status === 401) {
      localStorage.removeItem('access_token');
      document.getElementById('loginPrompt').style.display = 'block';
      return;
    }
    
    if (!res.ok) {
      throw new Error('加载失败');
    }
    
    const records = await res.json();
    
    if (records.length === 0) {
      document.getElementById('emptyState').style.display = 'block';
      return;
    }
    
    renderRecords(records);
    
  } catch (e) {
    alert('加载失败：' + e.message);
  }
}

// 渲染记录列表
function renderRecords(records) {
  const container = document.getElementById('recordsList');
  
  container.innerHTML = records.map(record => {
    const riskClass = record.risk_level === 'high' ? 'risk-high' : 
                      record.risk_level === 'medium' ? 'risk-medium' : 'risk-low';
    const riskText = record.risk_level === 'high' ? '高风险' : 
                     record.risk_level === 'medium' ? '中风险' : '低风险';
    
    const diagnosisText = record.suspected_diagnosis && record.suspected_diagnosis.length > 0 
      ? record.suspected_diagnosis.join('、') 
      : '暂无诊断结果';
    
    const date = new Date(record.created_at).toLocaleString('zh-CN');
    
    return `
      <div class="record-card" onclick="loadRecordDetail(${record.id})">
        <div class="record-header">
          <span class="record-date">${date}</span>
          <span class="risk-badge ${riskClass}">${riskText}</span>
        </div>
        <div class="record-diagnosis">${diagnosisText}</div>
      </div>
    `;
  }).join('');
}

// 加载记录详情
async function loadRecordDetail(recordId) {
  try {
    const res = await fetch(`${API_BASE}/diagnosis/records/${recordId}`, {
      headers: {
        'Authorization': `Bearer ${accessToken}`
      }
    });
    
    if (res.status === 401) {
      localStorage.removeItem('access_token');
      alert('登录已过期，请重新登录');
      window.location.href = '/';
      return;
    }
    
    if (!res.ok) {
      throw new Error('加载详情失败');
    }
    
    const record = await res.json();
    showDetailModal(record);
    
  } catch (e) {
    alert('加载详情失败：' + e.message);
  }
}

// 显示详情弹窗
function showDetailModal(record) {
  const riskClass = record.risk_level === 'high' ? 'risk-high' : 
                    record.risk_level === 'medium' ? 'risk-medium' : 'risk-low';
  const riskText = record.risk_level === 'high' ? '高风险' : 
                   record.risk_level === 'medium' ? '中风险' : '低风险';
  
  const date = new Date(record.created_at).toLocaleString('zh-CN');
  
  let recommendationsHtml = '';
  if (record.recommendations && record.recommendations.length > 0) {
    recommendationsHtml = `
      <div class="detail-section">
        <h3>💡 建议</h3>
        <div class="recommendations">
          <h4>就医建议</h4>
          <ul>
            ${record.recommendations.map(r => `<li>${r}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  }
  
  let diagnosisHtml = '';
  if (record.suspected_diagnosis && record.suspected_diagnosis.length > 0) {
    diagnosisHtml = `
      <div class="detail-section">
        <h3>🏥 疑似诊断</h3>
        <div class="detail-content">
          <ul class="diagnosis-list">
            ${record.suspected_diagnosis.map(d => `<li>${d}</li>`).join('')}
          </ul>
        </div>
      </div>
    `;
  }
  
  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <h3>📅 评估时间</h3>
      <div class="detail-content">${date}</div>
    </div>
    
    <div class="detail-section">
      <h3>⚠️ 风险等级</h3>
      <span class="risk-display ${riskClass}">${riskText}</span>
    </div>
    
    ${diagnosisHtml}
    
    ${recommendationsHtml}
    
    <div class="detail-section">
      <h3>📊 完整诊断数据</h3>
      <pre>${JSON.stringify(record, null, 2)}</pre>
    </div>
  `;
  
  document.getElementById('detailModal').classList.add('show');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
}

// 点击弹窗外部关闭
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) {
    closeModal();
  }
});
</script>
</body>
</html>
